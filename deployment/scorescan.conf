<VirtualHost *:80>
    ServerName YOUR.DOMAIN.HERE

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName scorescan.preining.info

    # SSL Configuration (adjust paths to your certificates)
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/XXXXXXXX/cert.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/XXXXXXXX/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/XXXXXXXXX/fullchain.pem

    # Modern SSL settings
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder off

    # Enable required modules (ensure these are enabled):
    # a2enmod proxy proxy_http rewrite ssl headers

    # --- Logging ---
    LogLevel warn
    ErrorLog ${APACHE_LOG_DIR}/preining.info/scorescan-error.log
    # Custom log format that strips query strings to avoid logging download tokens
    LogFormat "%h %l %u %t \"%m %U %H\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" noquery
    CustomLog ${APACHE_LOG_DIR}/preining.info/scorescan-access.log noquery

    # --- Security headers ---
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "0"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    # --- Block API docs at the proxy level ---
    <Location /docs>
        Require all denied
    </Location>
    <Location /redoc>
        Require all denied
    </Location>
    <Location /openapi.json>
        Require all denied
    </Location>

    # --- Proxy settings ---
    ProxyPreserveHost On
    ProxyRequests Off

    # Backend API
    ProxyPass /api http://localhost:8000/api
    ProxyPassReverse /api http://localhost:8000/api

    # Health check endpoint
    ProxyPass /health http://localhost:8000/health
    ProxyPassReverse /health http://localhost:8000/health

    # Frontend — proxy to the nginx container serving built static assets
    ProxyPass / http://localhost:5173/
    ProxyPassReverse / http://localhost:5173/

    # Increase timeouts for long-running requests (file uploads, processing)
    ProxyTimeout 300

    # Increase max upload size (50MB to match backend)
    LimitRequestBody 52428800
</VirtualHost>
